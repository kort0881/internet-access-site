name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Каждый час
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🛠️ Build static site
        run: |
          python build.py
          
      - name: 📄 Copy Yandex verification file
        run: |
          if [ -f "yandex_83bc89c155ecedc0.html" ]; then
            cp yandex_83bc89c155ecedc0.html ./dist/
            echo "✅ Yandex verification file copied to ./dist/"
          else
            echo "⚠️ Yandex verification file not found in root"
          fi
          
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: '🔄 Auto-update site'

